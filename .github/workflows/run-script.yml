name: JobNimbus Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run JobNimbus Sync
        env:
          JOBNIMBUS_API_KEY: ${{ secrets.JOBNIMBUS_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_FILE }}
          SPREADSHEET_ID: ${{ secrets.GSHEET_ID }}
        run: python main.py
